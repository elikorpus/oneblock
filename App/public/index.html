<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <!-- Keep the web build pinned to a phone aspect ratio, with black
         letterboxing filling the rest of the window on wider/desktop screens. -->
    <style id="phone-frame-reset">
      html,
      body {
        margin: 0;
        background: #000;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
      }
      #phone-frame {
        position: relative;
        width: 100%;
        max-width: 480px;
        height: 100%;
        max-height: 100vh;
        max-height: 100dvh;
        aspect-ratio: 9 / 19.5;
        margin: 0 auto;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- Phone-shaped frame so the app keeps a mobile aspect ratio on any screen size. -->
    <div id="phone-frame">
      <!-- The root element for your Expo app. -->
      <div id="root"></div>
    </div>
  </body>
</html>
